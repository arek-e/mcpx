apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcpxbackends.mcpx.io
spec:
  group: mcpx.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [transport]
              properties:
                transport:
                  type: string
                  enum: [stdio, http]
                command:
                  type: string
                args:
                  type: array
                  items:
                    type: string
                url:
                  type: string
                env:
                  type: object
                  additionalProperties:
                    type: string
                headers:
                  type: object
                  additionalProperties:
                    type: string
                allowedRoles:
                  type: array
                  items:
                    type: string
                allowedTeams:
                  type: array
                  items:
                    type: string
      additionalPrinterColumns:
        - name: Transport
          type: string
          jsonPath: .spec.transport
        - name: Command
          type: string
          jsonPath: .spec.command
        - name: URL
          type: string
          jsonPath: .spec.url
  scope: Namespaced
  names:
    plural: mcpxbackends
    singular: mcpxbackend
    kind: McpxBackend
    shortNames: [mbe]
