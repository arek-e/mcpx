apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: mcpx
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: mcpx
  template:
    metadata:
      labels:
        app: mcpx
    spec:
      {{- if .Values.crdController.enabled }}
      serviceAccountName: {{ .Release.Name }}-controller
      {{- end }}
      containers:
        - name: mcpx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["/config/mcpx.json"]
          ports:
            - containerPort: {{ .Values.service.port }}
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              {{- if not .Values.crdController.enabled }}
              readOnly: true
              {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
        {{- if .Values.crdController.enabled }}
        - name: crd-controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bun", "src/k8s-controller.ts"]
          args:
            - "--namespace"
            - "{{ .Release.Namespace }}"
            - "--output"
            - "/config/mcpx.json"
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        {{- end }}
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.crdController.enabled }}
        - name: config
          emptyDir: {}
        {{- else }}
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
        {{- end }}
